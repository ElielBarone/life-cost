<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta name="color-scheme" content="dark"/>
<title>Parâmetros do Cenário</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error-container": "#93000a",
                        "tertiary-fixed": "#ffe257",
                        "surface": "#131313",
                        "primary-container": "#00ffcc",
                        "on-secondary": "#00382b",
                        "inverse-on-surface": "#313030",
                        "error": "#ffb4ab",
                        "surface-container-high": "#2a2a2a",
                        "background": "#131313",
                        "surface-container-low": "#1c1b1b",
                        "outline-variant": "#3a4a44",
                        "tertiary": "#fffeff",
                        "on-secondary-fixed-variant": "#00513f",
                        "on-secondary-container": "#80c2ab",
                        "on-primary": "#00382b",
                        "inverse-surface": "#e5e2e1",
                        "tertiary-fixed-dim": "#e2c635",
                        "secondary": "#91d4bc",
                        "primary-fixed": "#24ffcd",
                        "primary": "#fdfffc",
                        "surface-container-lowest": "#0e0e0e",
                        "surface-bright": "#393939",
                        "on-surface": "#e5e2e1",
                        "surface-dim": "#131313",
                        "secondary-container": "#00513f",
                        "on-error": "#690005",
                        "surface-container-highest": "#353534",
                        "on-error-container": "#ffdad6",
                        "tertiary-container": "#ffe150",
                        "on-tertiary-container": "#746300",
                        "on-surface-variant": "#b9cbc2",
                        "primary-fixed-dim": "#00e0b3",
                        "on-primary-container": "#00725a",
                        "on-primary-fixed-variant": "#00513f",
                        "surface-container": "#201f1f",
                        "secondary-fixed-dim": "#91d4bc",
                        "surface-variant": "#353534",
                        "on-tertiary-fixed-variant": "#534600",
                        "on-tertiary": "#393000",
                        "inverse-primary": "#006b54",
                        "outline": "#83958d",
                        "on-secondary-fixed": "#002118",
                        "on-primary-fixed": "#002118",
                        "on-background": "#e5e2e1",
                        "on-tertiary-fixed": "#211b00",
                        "surface-tint": "#00e0b3",
                        "secondary-fixed": "#adf0d8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .headline-font {
            font-family: 'Manrope', sans-serif;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Main Content Area: Full Page View -->
<main class="flex-1 w-full max-w-md mx-auto p-6 flex flex-col">
<!-- Header -->
<header class="flex items-center justify-between mb-8">
<div class="flex items-center gap-3">
<button class="text-[#00FFCC] hover:bg-[#2A2A2A] transition-colors ease-out duration-200 active:scale-95 p-2 rounded-full">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-manrope tracking-tight font-bold text-lg text-[#00FFCC]">Scenario Parameters</h1>
</div>
<button class="font-manrope tracking-tight font-bold text-lg text-[#00FFCC] hover:bg-[#2A2A2A] transition-colors ease-out duration-200 active:scale-95 px-4 py-1 rounded-lg">
                Reset
            </button>
</header>
<!-- Explanatory Text -->
<section class="mb-8">
<p class="text-on-surface-variant text-sm leading-relaxed">
                Estes valores substituem os padrões do site neste aparelho. Salve para aplicar.
            </p>
</section>
<!-- Form Fields -->
<form class="space-y-6 flex-1">
<!-- Interest Rate Input -->
<div class="space-y-2">
<label class="block text-xs font-medium text-on-surface-variant tracking-wider uppercase">Taxa de juros mensal (%)</label>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary-container/30 focus:outline-none transition-all duration-200" placeholder="0,00" type="text"/>
<div class="absolute inset-0 border border-outline-variant/20 rounded-xl pointer-events-none group-focus-within:border-primary-container/50"></div>
</div>
</div>
<!-- Salary Input -->
<div class="space-y-2">
<label class="block text-xs font-medium text-on-surface-variant tracking-wider uppercase">Salário médio (R$/mês)</label>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-4 text-on-surface font-semibold focus:ring-2 focus:ring-primary-container/30 focus:outline-none transition-all duration-200" type="text" value="3.500"/>
<div class="absolute inset-0 border border-outline-variant/20 rounded-xl pointer-events-none group-focus-within:border-primary-container/50"></div>
</div>
</div>
<!-- Life Expectancy Input -->
<div class="space-y-2">
<label class="block text-xs font-medium text-on-surface-variant tracking-wider uppercase">Expectativa de vida (anos)</label>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-4 text-on-surface font-semibold focus:ring-2 focus:ring-primary-container/30 focus:outline-none transition-all duration-200" type="text" value="77"/>
<div class="absolute inset-0 border border-outline-variant/20 rounded-xl pointer-events-none group-focus-within:border-primary-container/50"></div>
</div>
</div>
</form>
<!-- Action Buttons -->
<div class="space-y-3 pt-8 pb-6 mt-auto">
<!-- Primary Action: Save -->
<button class="w-full py-4 px-6 rounded-xl bg-gradient-to-br from-primary-container to-primary-fixed-dim text-on-primary headline-font font-extrabold text-base tracking-tight shadow-lg shadow-primary-container/10 active:scale-[0.98] transition-all duration-200">
                Salvar
            </button>
<!-- Secondary Action: Defaults -->
<button class="w-full py-4 px-6 rounded-xl bg-transparent border border-outline-variant/30 text-primary-fixed-dim headline-font font-bold text-base tracking-tight active:bg-surface-container-high transition-all duration-200">
                Usar padrões do site
            </button>
</div>
</main>
</body></html>
