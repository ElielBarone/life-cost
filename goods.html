<!DOCTYPE html>
<html class="dark" lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <meta
      name="description"
      content="Lista de bens de exemplo para o simulador Custo ao longo da vida."
    />
    <title>Custo ao longo da vida — Bens de exemplo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="goods-page">
    <a class="skip-link" href="#main">Ir ao conteúdo</a>
    <header class="site-header">
      <div class="site-header__bar">
        <div class="site-header__brand">
          <span
            class="material-symbols-outlined site-header__icon"
            aria-hidden="true"
            >inventory_2</span
          >
          <span class="site-header__wordmark">Bens de exemplo</span>
        </div>
        <nav class="site-nav site-nav--bar" aria-label="Navegação">
          <a href="./index.html">Simulador</a>
        </nav>
      </div>
    </header>

    <main id="main" class="main">
      <p class="site-tagline--goods">
        Valores ilustrativos. Abra o simulador com o item pré-selecionado pelo
        botão em cada card.
      </p>
      <p id="goods-status" class="muted" aria-live="polite"></p>
      <ul id="goods-grid" class="goods-grid"></ul>
    </main>

    <footer class="site-footer">
      <p class="muted small">Dados em <code>assets/data/goods.json</code>.</p>
    </footer>

    <script type="module" src="./js/goods-page.js"></script>
  </body>
</html>
